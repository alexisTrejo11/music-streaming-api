# Cloud / production deploy: application container only.
# Database, Redis, Elasticsearch, S3, etc. are provided by external managed services.
#
# Run from repository root:
#   docker compose -f docker/docker-compose.prod.yml --project-directory . up -d --build

services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: music-api-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      COLLECT_STATIC: "true"
    ports:
      - "${WEB_PORT:-8000}:8000"
    volumes:
      - media_data:/app/media
      - logs_data:/app/logs

volumes:
  media_data:
  logs_data:
