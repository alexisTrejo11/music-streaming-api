# Local development stack: app + PostgreSQL + Redis.
#
# Run from repository root:
#   docker compose -f docker/docker-compose.local.yml --project-directory . up --build
#
# Service hostnames and credentials below are fixed for the local stack.
# Values from .env (e.g. production DATABASE_URL) are overridden for the web
# service so the app always connects to the postgres/redis containers.

x-local-postgres: &local-postgres
  POSTGRES_DB: music_db
  POSTGRES_USER: music
  POSTGRES_PASSWORD: music

services:
  postgres:
    image: postgres:16-alpine
    container_name: music-api-postgres
    restart: unless-stopped
    environment:
      <<: *local-postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U music -d music_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: music-api-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: music-api-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.docker
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1,web
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_URL: postgresql://music:music@postgres:5432/music_db
      COLLECT_STATIC: "false"
    command: >
      gunicorn config.wsgi:application
      --bind 0.0.0.0:8000
      --workers 2
      --threads 2
      --timeout 120
      --reload
    ports:
      - "${WEB_PORT:-8000}:8000"
    volumes:
      - .:/app
      - media_data:/app/media
      - logs_data:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  media_data:
  logs_data:
